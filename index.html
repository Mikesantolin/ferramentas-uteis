<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Soluções Rápidas - V2</title>
    <style>
        :root {
            --primary-color: #25d366;
            --secondary-color: #075e54;
            --bg-color: #f4f7f6;
            --sidebar-color: #2c3e50;
            --text-color: #333;
            --white: #ffffff;
            --accent-blue: #3498db;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body { background-color: var(--bg-color); display: flex; min-height: 100vh; }

        .sidebar { width: 250px; background-color: var(--sidebar-color); color: white; padding: 20px; flex-shrink: 0; }
        .sidebar h2 { font-size: 1.2rem; margin-bottom: 30px; text-align: center; border-bottom: 1px solid #455a64; padding-bottom: 10px; }
        .sidebar nav ul { list-style: none; }
        .sidebar nav ul li a { color: #bdc3c7; text-decoration: none; display: block; padding: 10px; border-radius: 5px; transition: 0.3s; margin-bottom: 5px; }
        .sidebar nav ul li a:hover, .sidebar nav ul li a.active { background-color: #34495e; color: white; }

        .main-content { flex-grow: 1; padding: 40px; }
        .header { margin-bottom: 30px; }
        .card { background: var(--white); padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 800px; margin-bottom: 20px; }
        
        .section-title { border-left: 4px solid var(--primary-color); padding-left: 10px; margin-bottom: 20px; color: var(--sidebar-color); }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; }

        .btn-container { display: flex; gap: 10px; margin-top: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-generate { background-color: var(--primary-color); color: white; }
        .btn-download { background-color: var(--accent-blue); color: white; display: none; }
        button:hover { opacity: 0.9; }

        .status-msg { margin-top: 15px; padding: 10px; border-radius: 4px; display: none; font-size: 0.9rem; }
        .status-success { background-color: #e8f5e9; color: #2e7d32; display: block; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>SOLUÇÕES LAB</h2>
        <nav>
            <ul>
                <li><a href="#" class="active">WhatsApp em Lote</a></li>
                <li><a href="#">Dashboard Performance</a></li>
            </ul>
        </nav>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Gerador de Links WhatsApp (Lote via CSV)</h1>
            <p>Automatize a criação de links para listas de contatos comerciais.</p>
        </div>

        <div class="card">
            <h3 class="section-title">1. Configurações Gerais</h3>
            <div class="form-group">
                <label>Código do País</label>
                <select id="countryCode">
                    <option value="55">Brasil (+55)</option>
                    <option value="1">EUA (+1)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Mensagem Padrão</label>
                <textarea id="globalMessage" placeholder="Olá, tudo bem?"></textarea>
            </div>

            <h3 class="section-title">2. Upload da Base</h3>
            <div class="form-group">
                <label>Selecione o CSV (Coluna 1 = Números)</label>
                <input type="file" id="csvFile" accept=".csv">
            </div>

            <div class="btn-container">
                <button class="btn-generate" onclick="processCSV()">Processar Lista</button>
                <button id="downloadBtn" class="btn-download" onclick="downloadResult()">Baixar CSV com Links</button>
            </div>

            <div id="statusMsg" class="status-msg"></div>
        </div>
    </div>

    <script>
        let processedData = "";

        function processCSV() {
            const fileInput = document.getElementById('csvFile');
            const country = document.getElementById('countryCode').value;
            const message = encodeURIComponent(document.getElementById('globalMessage').value);
            const statusMsg = document.getElementById('statusMsg');
            const downloadBtn = document.getElementById('downloadBtn');

            if (!fileInput.files[0]) {
                alert("Por favor, selecione um arquivo CSV.");
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                const rows = text.split(/\r?\n/); // Divide por linhas
                let csvContent = "Numero;Link_WhatsApp\n"; // Cabeçalho do novo CSV
                let count = 0;

                rows.forEach((row, index) => {
                    if (index === 0 && isNaN(row.split(/[;,]/)[0])) return; // Pula cabeçalho se existir

                    const columns = row.split(/[;,]/); // Aceita vírgula ou ponto e vírgula
                    let phone = columns[0].replace(/\D/g, '');

                    if (phone) {
                        const link = `https://wa.me/${country}${phone}${message ? '?text=' + message : ''}`;
                        csvContent += `${phone};${link}\n`;
                        count++;
                    }
                });

                processedData = csvContent;
                statusMsg.innerText = `Sucesso! ${count} números processados.`;
                statusMsg.className = "status-msg status-success";
                downloadBtn.style.display = "block";
            };

            reader.readAsText(fileInput.files[0]);
        }

        function downloadResult() {
            const blob = new Blob([processedData], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", "links_whatsapp_gerados.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>

    <script>
        async function processarLinks() {
            const lista = document.getElementById('listaLinks').value.split('\n');
            const resultadoArea = document.getElementById('resultado');
            resultadoArea.value = ""; // Limpa resultados anteriores

            for (let link of lista) {
                if (link.trim() === "") continue;

                try {
                    // A chamada para o encurtador
                    const resposta = await fetch(`http://facta.ly/_encurtador.php?url=${encodeURIComponent(link.trim())}`);
                    const linkCurto = await resposta.text();
                    resultadoArea.value += linkCurto + "\n";
                } catch (error) {
                    resultadoArea.value += "Erro ao encurtar: " + link + "\n";
                }
                
                // Pequena pausa para não sobrecarregar
                await new Promise(r => setTimeout(r, 500)); 
            }
            alert("Processo concluído!");
        }
    </script>
</body>
</html>
