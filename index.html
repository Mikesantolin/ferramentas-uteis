<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Soluções Rápidas</title>
    <style>
        :root {
            --primary-color: #25d366; /* Cor WhatsApp */
            --secondary-color: #075e54;
            --bg-color: #f4f7f6;
            --sidebar-color: #2c3e50;
            --text-color: #333;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            min-height: 100vh;
        }

        /* Menu Lateral */
        .sidebar {
            width: 250px;
            background-color: var(--sidebar-color);
            color: white;
            padding: 20px;
            flex-shrink: 0;
        }

        .sidebar h2 {
            font-size: 1.2rem;
            margin-bottom: 30px;
            text-align: center;
            border-bottom: 1px solid #455a64;
            padding-bottom: 10px;
        }

        .sidebar nav ul {
            list-style: none;
        }

        .sidebar nav ul li {
            margin-bottom: 10px;
        }

        .sidebar nav ul li a {
            color: #bdc3c7;
            text-decoration: none;
            display: block;
            padding: 10px;
            border-radius: 5px;
            transition: 0.3s;
        }

        .sidebar nav ul li a.active, .sidebar nav ul li a:hover {
            background-color: #34495e;
            color: white;
        }

        /* Área Principal */
        .main-content {
            flex-grow: 1;
            padding: 40px;
        }

        .header {
            margin-bottom: 30px;
        }

        .header h1 {
            color: var(--sidebar-color);
            font-size: 1.8rem;
        }

        /* Card da Solução */
        .card {
            background: var(--white);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 600px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-color);
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #1ebe57;
        }

        /* Resultado */
        .result-area {
            margin-top: 25px;
            padding: 15px;
            background-color: #e8f5e9;
            border-left: 5px solid var(--primary-color);
            border-radius: 4px;
            display: none; /* Escondido por padrão */
        }

        .result-area p {
            font-size: 0.9rem;
            color: var(--secondary-color);
            margin-bottom: 10px;
            word-break: break-all;
        }

        .copy-btn {
            background-color: var(--secondary-color);
            font-size: 12px;
            padding: 8px;
            width: auto;
            display: inline-block;
        }

    </style>
</head>
<body>

    <div class="sidebar">
        <h2>SOLUÇÕES LAB</h2>
        <nav>
            <ul>
                <li><a href="#" class="active">Link WhatsApp</a></li>
                <li><a href="#">Em breve...</a></li>
                <li><a href="#">Em breve...</a></li>
            </ul>
        </nav>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Gerador de Link Direto para WhatsApp</h1>
            <p>Crie links rápidos para iniciar conversas sem precisar salvar o contato.</p>
        </div>

        <div class="card">
            <div class="form-group">
                <label for="countryCode">Código do País</label>
                <select id="countryCode">
                    <option value="55">Brasil (+55)</option>
                    <option value="1">EUA (+1)</option>
                    <option value="351">Portugal (+351)</option>
                    <option value="54">Argentina (+54)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="phoneNumber">Número do Celular (com DDD)</label>
                <input type="text" id="phoneNumber" placeholder="Ex: 11999999999" maxlength="11">
            </div>

            <div class="form-group">
                <label for="message">Mensagem Padrão (Opcional)</label>
                <textarea id="message" placeholder="Olá, gostaria de falar sobre..."></textarea>
            </div>

            <button onclick="generateLink()">Gerar Link Encurtado</button>

            <div id="resultArea" class="result-area">
                <label>Seu Link Gerado:</label>
                <p id="generatedLink"></p>
                <button class="copy-btn" onclick="copyToClipboard()">Copiar Link</button>
            </div>
        </div>
    </div>

    <script>
        function generateLink() {
            const country = document.getElementById('countryCode').value;
            let phone = document.getElementById('phoneNumber').value.replace(/\D/g, ''); // Remove não números
            const message = document.getElementById('message').value;

            if (phone === "") {
                alert("Por favor, insira um número de telefone.");
                return;
            }

            // Formata o link oficial: https://wa.me/numerocompleto?text=mensagem_codificada
            const fullPhone = country + phone;
            const encodedMessage = encodeURIComponent(message);
            
            const finalLink = `https://wa.me/${fullPhone}${message ? '?text=' + encodedMessage : ''}`;

            // Exibe o resultado
            const resultArea = document.getElementById('resultArea');
            const linkDisplay = document.getElementById('generatedLink');
            
            linkDisplay.innerText = finalLink;
            resultArea.style.display = 'block';
        }

        function copyToClipboard() {
            const linkText = document.getElementById('generatedLink').innerText;
            navigator.clipboard.writeText(linkText).then(() => {
                alert("Link copiado para a área de transferência!");
            });
        }
    </script>
</body>
</html>
